<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft Assistant — LoL Comp Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --void-900:#050810;--void-800:#0a0f1a;--void-700:#0f1626;
    --neon-blue:#00d4ff;--neon-pink:#ff2d78;--neon-gold:#ffb800;--neon-green:#00ff88;
    --role-top:#e8975a;--role-jgl:#6bc26b;--role-mid:#6b9ee8;--role-adc:#e86b6b;--role-sup:#c9a5e8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--void-900);color:#b8c4d4;font-family:'Rajdhani',sans-serif;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
  .fd{font-family:'Orbitron',sans-serif} .fm{font-family:'Share Tech Mono',monospace}

  .panel{position:relative;border-radius:8px;padding:12px;background:rgba(10,15,26,0.85);border:1px solid #1a2235}
  .panel::before,.panel::after{content:'';position:absolute;width:14px;height:14px;pointer-events:none}
  .panel::before{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid;border-radius:8px 0 0 0}
  .panel::after{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid;border-radius:0 0 8px 0}
  .pnl-b{border-color:rgba(0,212,255,0.15)} .pnl-b::before,.pnl-b::after{border-color:rgba(0,212,255,0.3)}
  .pnl-r{border-color:rgba(255,45,120,0.15)} .pnl-r::before,.pnl-r::after{border-color:rgba(255,45,120,0.3)}

  .slot{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:3px;border-radius:5px;border:1px solid transparent;cursor:pointer;transition:all 0.15s}
  .slot:hover{background:rgba(255,255,255,0.03)}
  .slot-e{border:1px dashed #1a2540}
  .slot-fb{background:linear-gradient(90deg,rgba(0,212,255,0.06),transparent);border-color:#0a2a3a}
  .slot-fr{background:linear-gradient(90deg,transparent,rgba(255,45,120,0.06));border-color:#2a0a1a}
  .slot-a{animation:pulse 1.5s ease-in-out infinite;border-style:solid!important}
  @keyframes pulse{0%,100%{border-color:rgba(0,212,255,0.2)}50%{border-color:rgba(0,212,255,0.6)}}

  .rt{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;min-width:30px;text-align:center;letter-spacing:1px}
  .at{font-family:'Share Tech Mono',monospace;font-size:9px;padding:1px 6px;border-radius:2px;letter-spacing:0.5px}

  .cr{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;transition:background 0.12s}
  .cr:hover{background:rgba(0,212,255,0.05)}

  .pc{background:var(--void-900);border-radius:5px;padding:8px;border:1px solid #1a2235;cursor:pointer;transition:all 0.15s}
  .pc:hover{transform:translateY(-2px);border-color:rgba(0,212,255,0.4)}

  .btn{padding:6px 16px;border-radius:5px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1.5px;border:1px solid;cursor:pointer;transition:all 0.15s;background:transparent}
  .btn-ba{background:#1e3a5f;border-color:var(--neon-blue);color:#7dd3fc}
  .btn-bi{border-color:#1e293b;color:#475569}
  .btn-ra{background:#5f1e2e;border-color:var(--neon-pink);color:#fda4af}
  .btn-ri{border-color:#1e293b;color:#475569}

  .sb-bg{height:3px;background:#111827;border-radius:2px;overflow:hidden}
  .sb-f{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}

  .bt{padding:3px 8px;background:#1f0a10;border-radius:3px;font-size:10px;color:#f87171;cursor:pointer;border:1px solid #3f1520;font-family:'Share Tech Mono',monospace;transition:all 0.15s}
  .bt:hover{background:#2f1520;border-color:#5f2030}

  .rf{padding:2px 10px;border-radius:3px;font-size:9px;font-weight:700;border:1px solid #1e293b;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px;transition:all 0.15s;background:transparent;color:#475569}

  .si{width:100%;padding:7px 10px;background:var(--void-900);border:1px solid #1a2235;border-radius:5px;color:#c9d1d9;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;transition:border-color 0.15s}
  .si:focus{border-color:rgba(0,212,255,0.3)}

  .mg{display:grid;grid-template-columns:1fr 290px 1fr;gap:12px;max-width:1200px;margin:0 auto}
  @media(max-width:900px){.mg{grid-template-columns:1fr}}

  .fi{animation:fadeIn 0.2s ease-out}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .wr-badge{font-size:9px;padding:1px 5px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-weight:600}
  .pro-tag{font-size:8px;padding:1px 4px;border-radius:2px;font-family:'Share Tech Mono',monospace;letter-spacing:0.5px}
  .syn-tag{font-size:9px;font-family:'Share Tech Mono',monospace}
</style>
</head>
<body>
<div id="app" style="min-height:100vh;padding:12px 16px;max-width:1200px;margin:0 auto;">
  <header style="text-align:center;margin-bottom:16px;">
    <h1 class="fd" style="font-size:22px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#00d4ff,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">DRAFT ASSISTANT</h1>
    <p class="fm" style="font-size:10px;letter-spacing:3px;color:#4a5568;margin-top:4px;">PRO DATA EMBEDDINGS · SYNERGY ENGINE · COUNTER INTELLIGENCE</p>
  </header>
  <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px;">
    <button id="btn-blue" class="btn" onclick="setMyTeam('blue')">MY TEAM: BLUE</button>
    <button id="btn-red" class="btn" onclick="setMyTeam('red')">MY TEAM: RED</button>
    <button class="btn" style="border-color:#1e293b;color:#475569;" onclick="resetDraft()">RESET</button>
  </div>
  <div class="mg">
    <div class="panel pnl-b" id="blue-panel">
      <div id="blue-label" class="fd" style="font-size:11px;letter-spacing:3px;text-align:center;margin-bottom:10px;color:var(--neon-blue);"></div>
      <div id="blue-slots"></div>
      <div id="blue-analysis"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="panel" style="border-color:#2d200a;">
        <div class="fd" style="font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:8px;color:#b8860b;">BANS</div>
        <div id="bans-box" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;min-height:28px;"></div>
      </div>
      <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0;border-color:#1a2235;">
        <div id="rec-label" class="fd" style="font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:8px;color:#64748b;">RECOMMENDATIONS</div>
        <input id="search-input" class="si" type="text" placeholder="Search champion..." oninput="renderCenter()">
        <div id="role-filters" style="display:flex;gap:4px;justify-content:center;margin:8px 0;"></div>
        <div id="rec-list" style="flex:1;overflow-y:auto;max-height:440px;"></div>
      </div>
    </div>
    <div class="panel pnl-r" id="red-panel">
      <div id="red-label" class="fd" style="font-size:11px;letter-spacing:3px;text-align:center;margin-bottom:10px;color:var(--neon-pink);"></div>
      <div id="red-slots"></div>
      <div id="red-analysis"></div>
    </div>
  </div>
  <div id="reason-panel" class="panel" style="margin-top:12px;display:none;border-color:#1a2235;">
    <div id="reason-label" class="fd" style="font-size:10px;letter-spacing:3px;margin-bottom:8px;color:#64748b;"></div>
    <div id="reason-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;"></div>
  </div>
</div>

const RC={top:"#e8975a",jgl:"#6bc26b",mid:"#6b9ee8",adc:"#e86b6b",sup:"#c9a5e8"};

// ============================================================================
// SCORING ENGINE — uses pro data + heuristics
// ============================================================================

function getSynergy(a, b) {
  const k1 = a+'|'+b, k2 = b+'|'+a;
  return PRO_DATA.syn[k1] ?? PRO_DATA.syn[k2] ?? 0;
}

function getCounter(a, b, role) {
  // Returns win rate of 'a' vs 'b' in role. >0.5 means a wins.
  const k1 = a+'|'+b+'|'+role, k2 = b+'|'+a+'|'+role;
  if (PRO_DATA.ctr[k1] !== undefined) return PRO_DATA.ctr[k1];
  if (PRO_DATA.ctr[k2] !== undefined) return 1 - PRO_DATA.ctr[k2];
  return 0.5; // no data
}

function embSimilarity(a, b) {
  const ea = PRO_DATA.emb[a], eb = PRO_DATA.emb[b];
  if (!ea || !eb) return 0;
  let dot=0, ma=0, mb=0;
  for (let i=0; i<ea.length; i++) { dot+=ea[i]*eb[i]; ma+=ea[i]*ea[i]; mb+=eb[i]*eb[i]; }
  return ma && mb ? dot / (Math.sqrt(ma)*Math.sqrt(mb)) : 0;
}

function scoreChamp(name, myTeam, enemyTeam, role) {
  const c = C[name];
  if (!c) return {score:0, reasons:[]};
  const myPicks = myTeam.filter(s=>s.champ).map(s=>({name:s.champ,role:s.role,...C[s.champ]})).filter(p=>p.arch);
  const enemyPicks = enemyTeam.filter(s=>s.champ).map(s=>({name:s.champ,role:s.role,...C[s.champ]})).filter(p=>p.arch);
  let score = 50;
  const reasons = [];
  const st = PRO_DATA.stats[name];

  // --- Pro win rate ---
  if (st && st.g >= 20) {
    const wrBonus = (st.wr - 0.5) * 20; // ±10 points for 50%±
    if (Math.abs(wrBonus) >= 1) {
      score += wrBonus;
      reasons.push({t:`Pro WR ${(st.wr*100).toFixed(0)}% (${st.g}g)`, v:Math.round(wrBonus)});
    }
  }

  // --- Pro presence (meta relevance) ---
  if (st && st.pr >= 0.05) {
    const presBonus = Math.min(4, st.pr * 20);
    score += presBonus;
    reasons.push({t:`Meta pick (${(st.pr*100).toFixed(0)}% PR)`, v:Math.round(presBonus)});
  }

  // --- Role fit ---
  if (role && c.r !== role && c.r2 !== role) { score -= 15; reasons.push({t:"Off-role",v:-15}); }

  // --- Synergy with existing teammates (from pro data) ---
  if (myPicks.length > 0) {
    let totalSyn = 0;
    myPicks.forEach(p => {
      const syn = getSynergy(name, p.name);
      totalSyn += syn;
    });
    if (Math.abs(totalSyn) >= 0.02) {
      const synBonus = Math.round(totalSyn * 25); // scale to meaningful range
      score += synBonus;
      if (synBonus > 0) reasons.push({t:`Pro synergy +${totalSyn.toFixed(2)}`, v:synBonus});
      else if (synBonus < 0) reasons.push({t:`Weak synergy ${totalSyn.toFixed(2)}`, v:synBonus});
    }
  }

  // --- Counter enemy lane (from pro data) ---
  if (enemyPicks.length > 0 && role) {
    const laneOpp = enemyPicks.find(p => p.role === role);
    if (laneOpp) {
      const wr = getCounter(name, laneOpp.name, role);
      if (Math.abs(wr - 0.5) >= 0.05) {
        const ctrBonus = Math.round((wr - 0.5) * 30);
        score += ctrBonus;
        const label = wr > 0.5
          ? `Wins ${(wr*100).toFixed(0)}% vs ${laneOpp.name}`
          : `Loses ${((1-wr)*100).toFixed(0)}% vs ${laneOpp.name}`;
        reasons.push({t:label, v:ctrBonus});
      }
    }
  }

  // --- Heuristic team synergy ---
  if (myPicks.length > 0) {
    const hasEng = myPicks.some(p=>p.arch==="engage");
    const hasPeel = myPicks.some(p=>p.arch==="peel");
    const hasCarry = myPicks.some(p=>p.sc>=3);
    const hasFront = myPicks.some(p=>p.tank>=3);
    const dmgs = myPicks.map(p=>p.dt);
    const allAD = dmgs.every(d=>d==="physical");
    const allAP = dmgs.every(d=>d==="magic");
    const totalCC = myPicks.reduce((s,p)=>s+p.cc,0);
    const avgSc = myPicks.reduce((s,p)=>s+p.sc,0)/myPicks.length;

    if (!hasEng && c.arch==="engage") { score+=7; reasons.push({t:"Team needs engage",v:7}); }
    if (!hasPeel && hasCarry && c.arch==="peel") { score+=6; reasons.push({t:"Peel for carry",v:6}); }
    if (!hasFront && c.tank>=3 && myPicks.length>=2) { score+=5; reasons.push({t:"Adds frontline",v:5}); }
    if (allAD && myPicks.length>=2 && c.dt==="magic") { score+=5; reasons.push({t:"AP into full AD",v:5}); }
    if (allAP && myPicks.length>=2 && c.dt==="physical") { score+=5; reasons.push({t:"AD into full AP",v:5}); }
    if (totalCC<4 && c.cc>=3) { score+=4; reasons.push({t:"Adds CC",v:4}); }
    if (avgSc<1.0 && c.sc>=2) { score+=3; reasons.push({t:"Adds scaling",v:3}); }
    if (hasEng && ["burst","assassin","dps"].includes(c.arch)) { score+=2; reasons.push({t:"Follow-up for engage",v:2}); }
  }

  // --- Counter enemy comp (heuristic) ---
  if (enemyPicks.length > 0) {
    const eMob = enemyPicks.reduce((s,p)=>s+p.mob,0)/enemyPicks.length;
    const eTank = enemyPicks.reduce((s,p)=>s+p.tank,0)/enemyPicks.length;
    const eAllAD = enemyPicks.every(p=>p.dt==="physical");
    const eAllAP = enemyPicks.every(p=>p.dt==="magic");

    if (eMob>=2.5 && c.cc>=3) { score+=4; reasons.push({t:"CC vs mobile enemy",v:4}); }
    if (eTank>=2 && c.dt==="mixed") { score+=3; reasons.push({t:"Mixed dmg vs tanks",v:3}); }
    if (eAllAD && c.tank>=3) { score+=4; reasons.push({t:"Tank vs full AD",v:4}); }
    if (eAllAP && c.tank>=3) { score+=4; reasons.push({t:"Tank vs full AP",v:4}); }
    if (enemyPicks.some(p=>p.arch==="assassin") && c.arch==="peel") { score+=3; reasons.push({t:"Peel vs assassin",v:3}); }
  }

  score += c.sc * 1;
  return {score: Math.round(score), reasons};
}

function getRecs(myTeam, enemyTeam, banned, role, limit=20) {
  const taken = new Set([...myTeam.filter(s=>s.champ).map(s=>s.champ),...enemyTeam.filter(s=>s.champ).map(s=>s.champ),...banned]);
  return ALL.filter(n=>!taken.has(n)).filter(n=>!role||C[n].r===role||C[n].r2===role)
    .map(n=>({name:n,...scoreChamp(n,myTeam,enemyTeam,role)})).sort((a,b)=>b.score-a.score).slice(0,limit);
}

function analyzeComp(team) {
  const picks = team.filter(s=>s.champ).map(s=>({name:s.champ,...C[s.champ]})).filter(p=>p.arch);
  if (!picks.length) return null;
  const a = {
    cc:picks.reduce((s,p)=>s+p.cc,0), sc:picks.reduce((s,p)=>s+p.sc,0)/picks.length,
    tank:picks.reduce((s,p)=>s+p.tank,0)/picks.length, mob:picks.reduce((s,p)=>s+p.mob,0)/picks.length,
    dmg:{physical:0,magic:0,mixed:0}, archs:{}, issues:[], strengths:[], synergies:[]
  };
  picks.forEach(p=>{a.dmg[p.dt]=(a.dmg[p.dt]||0)+1; a.archs[p.arch]=(a.archs[p.arch]||0)+1;});

  // Issues
  if (a.dmg.physical>=4) a.issues.push("Full AD — enemy stacks armor");
  if (a.dmg.magic>=4) a.issues.push("Full AP — enemy stacks MR");
  if (a.cc<=3 && picks.length>=3) a.issues.push("Low CC — hard to lock targets");
  if (a.tank<0.5 && picks.length>=3) a.issues.push("No frontline — very squishy");
  if (!a.archs.engage && !a.archs.catcher && picks.length>=4) a.issues.push("No engage — need poke/picks");

  // Strengths
  if (a.archs.engage && (a.archs.burst||a.archs.dps)) a.strengths.push("Engage + follow-up");
  if (a.archs.peel && a.sc>=2) a.strengths.push("Protect-the-carry");
  if (a.dmg.physical>0 && a.dmg.magic>0) a.strengths.push("Mixed damage");
  if (a.cc>=12) a.strengths.push("CC-heavy teamfight");
  if (a.mob>=2.5) a.strengths.push("High mobility");

  // Pro synergy highlights
  if (picks.length >= 2) {
    for (let i=0;i<picks.length;i++) {
      for (let j=i+1;j<picks.length;j++) {
        const syn = getSynergy(picks[i].name, picks[j].name);
        if (syn >= 0.05) a.synergies.push({a:picks[i].name,b:picks[j].name,v:syn});
        else if (syn <= -0.05) a.synergies.push({a:picks[i].name,b:picks[j].name,v:syn});
      }
    }
    a.synergies.sort((x,y)=>Math.abs(y.v)-Math.abs(x.v));
  }

  return a;
}

// ============================================================================
// STATE
// ============================================================================
let blueTeam=ROLES.map(r=>({role:r,champ:null}));
let redTeam=ROLES.map(r=>({role:r,champ:null}));
let bans=[];
let activeSlot=null;
let myTeam='blue';
let filterRole=null;

function setMyTeam(s){myTeam=s;renderAll()}
function resetDraft(){blueTeam=ROLES.map(r=>({role:r,champ:null}));redTeam=ROLES.map(r=>({role:r,champ:null}));bans=[];activeSlot=null;filterRole=null;document.getElementById('search-input').value='';renderAll()}
function clickSlot(t,i){const tm=t==='blue'?blueTeam:redTeam;if(tm[i].champ)return;activeSlot={team:t,idx:i};renderAll();document.getElementById('search-input').focus()}
function removeChamp(t,i){(t==='blue'?blueTeam:redTeam)[i].champ=null;renderAll()}
function clickBanBtn(){activeSlot={type:'ban'};renderAll();document.getElementById('search-input').focus()}
function removeBan(i){bans.splice(i,1);renderAll()}
function pickChamp(n){if(!activeSlot)return;if(activeSlot.type==='ban')bans.push(n);else{(activeSlot.team==='blue'?blueTeam:redTeam)[activeSlot.idx].champ=n}activeSlot=null;document.getElementById('search-input').value='';renderAll()}
function toggleRole(r){filterRole=filterRole===r?null:r;renderAll()}

// ============================================================================
// RENDERING
// ============================================================================
function renderAll(){renderBtns();renderSlots('blue');renderSlots('red');renderBans();renderCenter();renderAnalysis('blue');renderAnalysis('red');renderReasoning()}

function renderBtns(){
  document.getElementById('btn-blue').className='btn '+(myTeam==='blue'?'btn-ba':'btn-bi');
  document.getElementById('btn-red').className='btn '+(myTeam==='red'?'btn-ra':'btn-ri');
  document.getElementById('blue-label').innerHTML='BLUE SIDE'+(myTeam==='blue'?' <span style="font-size:8px;color:#64748b">(YOU)</span>':'');
  document.getElementById('red-label').innerHTML='RED SIDE'+(myTeam==='red'?' <span style="font-size:8px;color:#64748b">(YOU)</span>':'');
}

function renderSlots(side){
  const team=side==='blue'?blueTeam:redTeam;
  const el=document.getElementById(side+'-slots');
  let h='';
  team.forEach((sl,i)=>{
    const isA=activeSlot&&activeSlot.team===side&&activeSlot.idx===i;
    const c=sl.champ?C[sl.champ]:null;
    const st=sl.champ?PRO_DATA.stats[sl.champ]:null;
    const fc=sl.champ?'slot-f'+side[0]:'slot-e';
    const ac=isA?' slot-a':'';
    h+=`<div class="slot ${fc}${ac}" onclick="${sl.champ?'':`clickSlot('${side}',${i})`}">`;
    h+=`<span class="rt" style="color:${RC[sl.role]}">${RL[sl.role]}</span>`;
    if(sl.champ){
      const ab=(AC[c.arch]||'#555')+'25', acl=AC[c.arch]||'#888';
      h+=`<span style="font-size:13px;font-weight:600;flex:1;color:#e2e8f0">${sl.champ}</span>`;
      // Pro WR badge
      if(st&&st.g>=10){
        const wrc=st.wr>=0.52?'#34d399':st.wr<=0.48?'#f87171':'#94a3b8';
        h+=`<span class="wr-badge" style="background:${wrc}15;color:${wrc}">${(st.wr*100).toFixed(0)}%</span>`;
      }
      h+=`<span class="at" style="background:${ab};color:${acl}">${c.arch}</span>`;
      h+=`<span onclick="event.stopPropagation();removeChamp('${side}',${i})" style="font-size:11px;color:#4a5568;cursor:pointer;padding:0 4px;margin-left:2px">✕</span>`;
    }else{
      const col=isA?(side==='blue'?'var(--neon-blue)':'var(--neon-pink)'):'#374151';
      h+=`<span style="font-size:11px;color:${col};flex:1">${isA?'Select champion...':'Click to pick'}</span>`;
    }
    h+='</div>';
  });
  el.innerHTML=h;
}

function renderBans(){
  const el=document.getElementById('bans-box');
  let h='';
  bans.forEach((b,i)=>{h+=`<span class="bt" onclick="removeBan(${i})">✕ ${b}</span>`});
  const isA=activeSlot&&activeSlot.type==='ban';
  h+=`<button class="bt" style="background:${isA?'#3f1520':'#111827'};border-color:${isA?'#7f2030':'#1e293b'};color:#9ca3af" onclick="clickBanBtn()">+ BAN</button>`;
  el.innerHTML=h;
}

function renderCenter(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const myT=myTeam==='blue'?blueTeam:redTeam;
  const enT=myTeam==='blue'?redTeam:blueTeam;
  const taken=new Set([...blueTeam.filter(s=>s.champ).map(s=>s.champ),...redTeam.filter(s=>s.champ).map(s=>s.champ),...bans]);

  // Role filters
  let fh='';
  ROLES.forEach(r=>{
    const a=filterRole===r;
    fh+=`<button class="rf" style="background:${a?RC[r]+'25':'transparent'};border-color:${a?RC[r]:'#1e293b'};color:${a?RC[r]:'#475569'}" onclick="toggleRole('${r}')">${RL[r]}</button>`;
  });
  document.getElementById('role-filters').innerHTML=fh;

  // Label
  const lbl=document.getElementById('rec-label');
  if(activeSlot){lbl.textContent=activeSlot.type==='ban'?'SELECT BAN':'PICK FOR '+RL[ROLES[activeSlot.idx]]}
  else lbl.textContent='RECOMMENDATIONS';

  // Build list
  let list;
  if(activeSlot){
    list=ALL.filter(n=>!taken.has(n)).filter(n=>!search||n.toLowerCase().includes(search))
      .filter(n=>!filterRole||C[n].r===filterRole||C[n].r2===filterRole)
      .map(n=>{const role=(activeSlot.type!=='ban'&&activeSlot.team)?ROLES[activeSlot.idx]:null;return{name:n,...scoreChamp(n,myT,enT,role)}})
      .sort((a,b)=>b.score-a.score);
  }else{
    list=getRecs(myT,enT,bans,filterRole,30);
  }

  let lh='';
  list.forEach(item=>{
    const c=C[item.name], st=PRO_DATA.stats[item.name];
    const ab=(AC[c.arch]||'#555')+'20', acl=AC[c.arch]||'#888';
    const sc=item.score>=65?'#34d399':item.score>=55?'#a3e635':'#fbbf24';
    const esc=item.name.replace(/'/g,"\\'");

    lh+=`<div class="cr fi" onclick="${activeSlot?`pickChamp('${esc}')`:''}">`;
    lh+=`<span style="font-size:8px;padding:1px 5px;border-radius:2px;background:${RC[c.r]}20;color:${RC[c.r]};font-weight:700;min-width:26px;text-align:center;font-family:'Orbitron',sans-serif">${RL[c.r]}</span>`;
    lh+=`<span style="font-size:12px;font-weight:600;flex:1;color:#e2e8f0">${item.name}</span>`;

    // Pro stats badges
    if(st&&st.g>=10){
      const wrc=st.wr>=0.52?'#34d399':st.wr<=0.48?'#f87171':'#94a3b8';
      lh+=`<span class="pro-tag" style="background:${wrc}12;color:${wrc}">${(st.wr*100).toFixed(0)}%</span>`;
    }
    if(st&&st.pr>=0.03){
      lh+=`<span class="pro-tag" style="background:#8b5cf615;color:#a78bfa">${st.g}g</span>`;
    }

    lh+=`<span class="fm" style="font-size:11px;font-weight:700;color:${sc};min-width:28px;text-align:right">${item.score}</span>`;
    lh+=`<span class="at" style="background:${ab};color:${acl}">${c.arch}</span>`;
    lh+='</div>';
  });
  document.getElementById('rec-list').innerHTML=lh;
}

function renderAnalysis(side){
  const team=side==='blue'?blueTeam:redTeam;
  const el=document.getElementById(side+'-analysis');
  const a=analyzeComp(team);
  if(!a){el.innerHTML='';return}

  const bar=(l,v,mx,col)=>{
    const p=Math.min(100,(v/mx)*100), d=v%1?v.toFixed(1):v;
    return `<div style="margin-bottom:4px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span class="fm" style="font-size:9px;color:#64748b">${l}</span><span class="fm" style="font-size:9px;color:${col};font-weight:600">${d}</span></div><div class="sb-bg"><div class="sb-f" style="width:${p}%;background:${col}"></div></div></div>`;
  };

  let h='<div style="margin-top:10px;padding:8px;background:#080c14;border-radius:5px;border:1px solid #141d2d">';
  h+='<div class="fd" style="font-size:9px;letter-spacing:2px;color:#64748b;margin-bottom:8px">COMP ANALYSIS</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
  h+=bar('CC',a.cc,20,'#f59e0b')+bar('SCALE',a.sc,3,'#8b5cf6')+bar('TANK',a.tank,4,'#10b981')+bar('MOBIL',a.mob,4,'#3b82f6');
  h+='</div>';

  // Damage types
  h+='<div style="display:flex;gap:4px;margin-bottom:6px">';
  const dtc={physical:'#fca5a5',magic:'#93c5fd',mixed:'#fde68a'};
  const dtb={physical:'#7f1d1d25',magic:'#1e3a5f25',mixed:'#3d2f0025'};
  Object.entries(a.dmg).filter(([_,v])=>v>0).forEach(([t,v])=>{
    h+=`<span class="fm" style="font-size:9px;padding:2px 6px;border-radius:2px;background:${dtb[t]};color:${dtc[t]}">${t}: ${v}</span>`;
  });
  h+='</div>';

  // Pro synergy highlights
  if(a.synergies.length>0){
    h+='<div style="margin-bottom:6px">';
    a.synergies.slice(0,3).forEach(s=>{
      const col=s.v>0?'#34d399':'#f87171';
      const icon=s.v>0?'⚡':'⚠';
      h+=`<div class="syn-tag" style="color:${col};margin-bottom:1px">${icon} ${s.a} + ${s.b}: ${s.v>0?'+':''}${(s.v*100).toFixed(1)}% synergy</div>`;
    });
    h+='</div>';
  }

  a.issues.forEach(i=>{h+=`<div style="font-size:11px;color:#f87171;margin-bottom:2px">⚠ ${i}</div>`});
  a.strengths.forEach(s=>{h+=`<div style="font-size:11px;color:#34d399;margin-bottom:2px">✦ ${s}</div>`});
  h+='</div>';
  el.innerHTML=h;
}

function renderReasoning(){
  const panel=document.getElementById('reason-panel');
  if(!activeSlot||activeSlot.type==='ban'){panel.style.display='none';return}
  const myT=myTeam==='blue'?blueTeam:redTeam;
  const enT=myTeam==='blue'?redTeam:blueTeam;
  const role=ROLES[activeSlot.idx];
  const recs=getRecs(myT,enT,bans,role,6);
  if(!recs.length){panel.style.display='none';return}
  panel.style.display='block';
  document.getElementById('reason-label').textContent='TOP PICKS — '+RL[role];
  let h='';
  recs.forEach(rec=>{
    const sc=rec.score>=65?'#34d399':rec.score>=55?'#a3e635':'#fbbf24';
    const esc=rec.name.replace(/'/g,"\\'");
    const st=PRO_DATA.stats[rec.name];
    h+=`<div class="pc" onclick="pickChamp('${esc}')">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">`;
    h+=`<span style="font-size:13px;font-weight:700;color:#e2e8f0">${rec.name}</span>`;
    h+=`<span class="fm" style="font-size:13px;font-weight:700;color:${sc}">${rec.score}</span>`;
    h+='</div>';
    // Pro stats line
    if(st&&st.g>=10){
      const wrc=st.wr>=0.52?'#6ee7b7':st.wr<=0.48?'#fca5a5':'#94a3b8';
      h+=`<div class="fm" style="font-size:9px;color:#64748b;margin-bottom:3px">Pro: ${(st.wr*100).toFixed(0)}% WR · ${st.g} games · ${(st.pr*100).toFixed(0)}% pick</div>`;
    }
    rec.reasons.forEach(r=>{
      const col=r.v>0?'#6ee7b7':'#fca5a5';
      h+=`<div class="fm" style="font-size:10px;color:${col};margin-top:1px">${r.v>0?'+':''}${r.v} ${r.t}</div>`;
    });
    h+='</div>';
  });
  document.getElementById('reason-cards').innerHTML=h;
}

renderAll();
</script>
